<!DOCTYPE HTML>
<html>
<body style="height:250px">
	<div style="float:left">First float</div>
	<div id="resizeMe" style="float:left;width:100%">Second float</div>
	<div>
		<div style="float:left;margin-top:1px">Third float, which should bounce up and down every 200ms</div>
	</div>
<script>
setInterval(function(){
	var resizeMe = document.getElementById("resizeMe");
	if (!resizeMe.style.height || resizeMe.style.height == "auto") {
		resizeMe.style.height = "100px";
	} else {
		resizeMe.style.height = "auto";
	}
}, 200);
</script>
</body>
</html>
